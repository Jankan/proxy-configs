# 地区策略
香港节点 = smart, include-other-group=HUB, update-interval=0, no-alert=0, hidden=1, include-all-proxies=0, policy-regex-filter=(🇭🇰)|(港)|(香港)|(Hong)|(HK), icon-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/HK.png
台湾节点 = smart, include-other-group=HUB, update-interval=0, no-alert=0, hidden=1, include-all-proxies=0, policy-regex-filter=(🇨🇳)|(湾)|(台湾)|(Taiwan)|(TW), icon-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/TW.png
日本节点 = smart, include-other-group=HUB, update-interval=0, no-alert=0, hidden=1, include-all-proxies=0, policy-regex-filter=(🇯🇵)|(日本)|(Japan)|(JP), icon-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/JP.png
韩国节点 = smart, include-other-group=HUB, update-interval=0, no-alert=0, hidden=1, include-all-proxies=0, policy-regex-filter=(🇰🇷)|(韩)|(韩国)|(Korea)|(KR), icon-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/KR.png
新加坡节点 = smart, include-other-group=HUB, update-interval=0, no-alert=0, hidden=1, include-all-proxies=0, policy-regex-filter=(🇸🇬)|(新加坡)|(Singapore)|(SG), icon-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/SG.png
美国节点 = smart, include-other-group=HUB, update-interval=0, no-alert=0, hidden=1, include-all-proxies=0, policy-regex-filter=(🇺🇸)|(美)|(美国)|(States)|(US), icon-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/US.png

# 兜底策略
兜底后备策略 = fallback, include-other-group=HUB, policy-regex-filter=(🇭🇰)|(🇨🇳)|(🇸🇬)|(🇯🇵)|(🇺🇸)|(🇰🇷)|(Hong)|(Taiwan)|(Singapore)|(Japan)|(United States)|(Korea), url=http://www.gstatic.com/generate_204, interval=60, timeout=5, icon-url=https://raw.githubusercontent.com/Koolson/Qure/refs/heads/master/IconSet/Color/Final.png

